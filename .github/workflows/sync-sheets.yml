name: Sync Google Sheets → Dashboard Data

on:
  schedule:
    # Runs daily at 6:00 AM ET (10:00 UTC)
    - cron: "0 10 * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch sheet data
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: "147Tl2ahMg0-sGrkKKQtk0f_tuy2AXba3fu7VH9WZD9Q"
        run: node scripts/sync-sheets.js

      - name: Commit updated data file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/1500-gateway.json
          git diff --cached --quiet || git commit -m "chore: sync dashboard data from Google Sheets"
          git push
